<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metodos de optimizacion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header class="app-header">
            <div>
                <h1>Metodos de optimizacion</h1>
            </div>

            <label class="method-picker">
                Metodo
                <select id="metodo" onchange="cambiarMetodo()">
                    <option value="transporte">Transporte - Esquina Noroeste</option>
                    <option value="simplex">Simplex - Minimizacion</option>
                </select>
            </label>
        </header>

        <section id="transporte-panel" class="method-panel">
            <div class="card">
                <h2>Metodo de transporte</h2>
                <div class="controls">
                    <label>Filas
                        <input type="number" id="rows" min="1" value="3">
                    </label>

                    <label>Columnas
                        <input type="number" id="cols" min="1" value="3">
                    </label>

                    <button onclick="crearTablaTransporte()">Generar tabla</button>
                    <button onclick="cargarEjemploTransporte()">Cargar ejemplo</button>
                    <button onclick="resolver()">Resolver</button>
                </div>

                <div id="tabla-container"></div>
            </div>
        </section>

        <section id="simplex-panel" class="method-panel hidden">
            <div class="card">
                <h2>Metodo simplex para minimizar</h2>
                <div class="controls">
                    <label>Variables
                        <input type="number" id="simplex-vars" min="1" value="2">
                    </label>

                    <label>Restricciones
                        <input type="number" id="simplex-res" min="1" value="2">
                    </label>

                    <button onclick="crearTablaSimplex()">Generar tabla</button>
                    <button onclick="cargarEjemploSimplex()">Cargar ejemplo</button>
                    <button onclick="resolver()">Resolver</button>
                </div>

                <div id="simplex-form"></div>
            </div>
        </section>

        <section class="card results-card">
            <h2>Resultado</h2>
            <div id="resultado" class="result-placeholder">
                Selecciona un metodo, ingresa los datos y presiona Resolver.
            </div>
        </section>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/transporte.js"></script>
    <script src="js/simplex.js"></script>
    <script src="script.js"></script>
</body>
</html>
